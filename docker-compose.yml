services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cool_cms
      POSTGRES_USER: cool
      POSTGRES_PASSWORD: cool
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cool -d cool_cms"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://cool:cool@postgres:5432/cool_cms
      CORS_ORIGIN: http://localhost:8080
      AUTO_MIGRATE: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:
